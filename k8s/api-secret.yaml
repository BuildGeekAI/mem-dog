# API authentication secret for the mem-dog API.
# Replace <YOUR_API_KEY> with a strong random key before applying.
#
# Generate one with:  python3 -c "import secrets; print(secrets.token_urlsafe(32))"
apiVersion: v1
kind: Secret
metadata:
  name: api-auth-secret
  namespace: mem-dog
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: mem-dog
type: Opaque
stringData:
  API_KEY: "<YOUR_API_KEY>"
