apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-server-routes
  namespace: mem-dog
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: mcp-server
spec:
  parentRefs:
    - name: open-jaws
      namespace: webhook-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: mcp-server
          port: 8080
