apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-gateway
  namespace: webhook-gateway
spec:
  template:
    spec:
      containers:
        - name: webhook-gateway
          image: webhook-gateway:local
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
