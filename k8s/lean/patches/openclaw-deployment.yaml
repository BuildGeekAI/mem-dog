apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-node
  namespace: webhook-gateway
spec:
  template:
    spec:
      containers:
        - name: openclaw-node
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
