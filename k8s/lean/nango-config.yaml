apiVersion: v1
kind: ConfigMap
metadata:
  name: nango-config
  namespace: nango
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: lean-local
data:
  NANGO_DB_HOST: "nango-db.nango.svc.cluster.local"
  NANGO_DB_PORT: "5432"
  NANGO_DB_NAME: "nango"
  NANGO_DB_USER: "nango"
  # Local OAuth callback via port-forward (use ngrok URL for real provider callbacks).
  NANGO_SERVER_URL: "http://localhost:3003"
  FLAG_AUTH_ENABLED: "false"
  NANGO_DASHBOARD_USERNAME: "admin"
