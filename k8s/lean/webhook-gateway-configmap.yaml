apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-gateway-config
  namespace: webhook-gateway
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: lean-local
data:
  MEM_DOG_API_URL: "http://api.mem-dog.svc.cluster.local:8080"
  WEBHOOK_GATEWAY_URL: "http://api.mem-dog.svc.cluster.local:8080/api/v1/ingest"
  LLM_PROVIDER: "gemini"
  LLM_MODEL: ""
  LLM_API_BASE: ""
  GEMINI_MODEL: "gemini-3.1-pro-preview"
  OTEL_ENABLED: "false"
  OTEL_SERVICE_NAME: "webhook-gateway"
  LOG_LEVEL: "DEBUG"
  DEFAULT_USER_ID: "00000000-0000-0000-0000-000000000001"
  PORT: "8080"
  MAX_PAYLOAD_BYTES: "10485760"
  WGW_RATE_LIMIT: "0"
