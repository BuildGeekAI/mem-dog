# LOCAL_DEV ADK agent — same FastAPI image as GKE webhook-agent, HTTP trigger
# (no NATS). Scaled to 0 in lean full (uses NATS + webhook-agent instead).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-processor
  namespace: webhook-pipeline
  labels:
    app: webhook-processor
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: adk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-processor
  template:
    metadata:
      labels:
        app: webhook-processor
        app.kubernetes.io/part-of: mem-dog
        app.kubernetes.io/component: adk-agent
    spec:
      containers:
        - name: processor
          image: webhook-processor:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: webhook-processor-config
            - secretRef:
                name: webhook-pipeline-secrets
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-processor
  namespace: webhook-pipeline
  labels:
    app: webhook-processor
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: adk-agent
spec:
  type: ClusterIP
  selector:
    app: webhook-processor
  ports:
    - port: 8080
      targetPort: 8080
      name: http
