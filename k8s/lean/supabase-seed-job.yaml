# Lean seed Job — waits for Postgres before applying schema (idempotent).
# Base: k8s/supabase/seed-job.yaml + seed-configmap.sql
apiVersion: batch/v1
kind: Job
metadata:
  name: supabase-seed
  namespace: supabase
  labels:
    app.kubernetes.io/name: supabase-seed
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: lean-local
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supabase-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: pgvector/pgvector:pg16
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Waiting for Supabase Postgres ==="
              for i in $(seq 1 60); do
                if pg_isready -h supabase-db.supabase.svc.cluster.local -U postgres -d postgres >/dev/null 2>&1; then
                  echo "Postgres is ready (attempt $i)"
                  break
                fi
                echo "Waiting for postgres... ($i/60)"
                sleep 2
              done
              pg_isready -h supabase-db.supabase.svc.cluster.local -U postgres -d postgres
              echo "=== Seeding mem-dog tables into Supabase Postgres ==="
              for f in /seed-sql/*.sql; do
                echo "--- Running $f ---"
                psql -h supabase-db.supabase.svc.cluster.local \
                     -U postgres -d postgres -f "$f"
              done
              echo "=== Seed complete ==="
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: seed-sql
              mountPath: /seed-sql
              readOnly: true
      volumes:
        - name: seed-sql
          configMap:
            name: supabase-seed-sql
