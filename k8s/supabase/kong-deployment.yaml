apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-kong
  namespace: supabase
  labels:
    app.kubernetes.io/name: supabase-kong
    app.kubernetes.io/part-of: memdog
    app.kubernetes.io/component: supabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: supabase-kong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supabase-kong
        app.kubernetes.io/part-of: memdog
        app.kubernetes.io/component: supabase
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              sed \
                -e "s|\${SUPABASE_ANON_KEY}|${SUPABASE_ANON_KEY}|g" \
                -e "s|\${SUPABASE_SERVICE_KEY}|${SUPABASE_SERVICE_KEY}|g" \
                /etc/kong-template/kong.yml > /etc/kong/kong.yml
          env:
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: ANON_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: SERVICE_ROLE_KEY
          volumeMounts:
            - name: kong-config-template
              mountPath: /etc/kong-template
              readOnly: true
            - name: kong-config-rendered
              mountPath: /etc/kong
      containers:
        - name: kong
          image: kong:3.7
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /etc/kong/kong.yml
            - name: KONG_DNS_ORDER
              value: LAST,A,CNAME
            - name: KONG_PLUGINS
              value: request-transformer,cors,key-auth,acl
            - name: KONG_NGINX_PROXY_PROXY_BUFFER_SIZE
              value: 160k
            - name: KONG_NGINX_PROXY_PROXY_BUFFERS
              value: 64 160k
          volumeMounts:
            - name: kong-config-rendered
              mountPath: /etc/kong
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: kong-config-template
          configMap:
            name: supabase-kong-config
        - name: kong-config-rendered
          emptyDir: {}
