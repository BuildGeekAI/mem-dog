# Secrets are base64-encoded.  Replace placeholder values before applying.
# In production use External Secrets Operator or sealed-secrets instead.
#
# Generate secrets:
#   JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')
#   ANON_KEY — generate a Supabase JWT with role=anon using the JWT_SECRET
#   SERVICE_ROLE_KEY — generate a Supabase JWT with role=service_role using the JWT_SECRET
#
# Helper (requires pyjwt):
#   python3 -c "
#   import jwt, json
#   secret = 'YOUR_JWT_SECRET'
#   anon = jwt.encode({'role': 'anon', 'iss': 'supabase', 'iat': 1700000000, 'exp': 2000000000}, secret, algorithm='HS256')
#   sr = jwt.encode({'role': 'service_role', 'iss': 'supabase', 'iat': 1700000000, 'exp': 2000000000}, secret, algorithm='HS256')
#   print(f'ANON_KEY={anon}')
#   print(f'SERVICE_ROLE_KEY={sr}')
#   "
apiVersion: v1
kind: Secret
metadata:
  name: supabase-secrets
  namespace: supabase
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: supabase
type: Opaque
data:
  POSTGRES_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_JWT_SECRET"
  ANON_KEY: "REPLACE_WITH_BASE64_ENCODED_ANON_KEY"
  SERVICE_ROLE_KEY: "REPLACE_WITH_BASE64_ENCODED_SERVICE_ROLE_KEY"
  # Dashboard credentials for Supabase Studio:
  DASHBOARD_USERNAME: "REPLACE_WITH_BASE64_ENCODED_USERNAME"
  DASHBOARD_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_PASSWORD"
