# Google OAuth credentials for Supabase Auth (GoTrue).
# Replace placeholder values with real credentials from
# GCP Console > APIs & Services > Credentials > OAuth 2.0 Client IDs.
# Authorized redirect URI: http://34.36.80.165/auth/v1/callback
apiVersion: v1
kind: Secret
metadata:
  name: supabase-auth-oauth
  namespace: supabase
  labels:
    app.kubernetes.io/part-of: memdog
    app.kubernetes.io/component: supabase
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"
