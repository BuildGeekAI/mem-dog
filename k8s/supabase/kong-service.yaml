apiVersion: v1
kind: Service
metadata:
  name: supabase-kong
  namespace: supabase
  labels:
    app.kubernetes.io/name: supabase-kong
    app.kubernetes.io/part-of: memdog
    app.kubernetes.io/component: supabase
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: proxy
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: proxy-ssl
  selector:
    app.kubernetes.io/name: supabase-kong
