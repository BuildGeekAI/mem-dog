apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-auth
  namespace: supabase
  labels:
    app.kubernetes.io/name: supabase-auth
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: supabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: supabase-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supabase-auth
        app.kubernetes.io/part-of: mem-dog
        app.kubernetes.io/component: supabase
    spec:
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.158.1
          ports:
            - containerPort: 9999
              name: http
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: POSTGRES_PASSWORD
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              value: "http://34.36.80.165"
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@supabase-db.supabase.svc.cluster.local:5432/postgres?search_path=auth"
            - name: GOTRUE_SITE_URL
              value: "https://mem-dog-ui-dev-204556389124.us-central1.run.app"
            - name: GOTRUE_URI_ALLOW_LIST
              value: "https://mem-dog-ui-dev-204556389124.us-central1.run.app"
            - name: GOTRUE_DISABLE_SIGNUP
              value: "false"
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: JWT_SECRET
            - name: GOTRUE_JWT_EXP
              value: "3600"
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: authenticated
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "true"
            - name: GOTRUE_EXTERNAL_PHONE_ENABLED
              value: "false"
            - name: GOTRUE_EXTERNAL_GOOGLE_ENABLED
              value: "true"
            - name: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: supabase-auth-oauth
                  key: GOOGLE_CLIENT_ID
            - name: GOTRUE_EXTERNAL_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-auth-oauth
                  key: GOOGLE_CLIENT_SECRET
            - name: GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI
              value: "https://mem-dog-ui-dev-204556389124.us-central1.run.app/auth/v1/callback"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 30
