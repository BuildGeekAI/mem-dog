# HealthCheckPolicy for supabase-kong service so GKE Gateway health checks
# use /auth/v1/health (returns 200) instead of / (returns 404).
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: supabase-kong-healthcheck
  namespace: supabase
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: supabase
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /auth/v1/health
        port: 8000
  targetRef:
    group: ""
    kind: Service
    name: supabase-kong
