# Secrets are base64-encoded.  Replace placeholder values before applying.
# In production use External Secrets Operator or sealed-secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: webhook-gateway-secrets
  namespace: webhook-gateway
  labels:
    app.kubernetes.io/part-of: mem-dog
    app.kubernetes.io/component: webhook-gateway
type: Opaque
data:
  GEMINI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  WEBHOOK_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  WEBHOOK_GATEWAY_URL: "REPLACE_WITH_BASE64_ENCODED_URL"
  MEM_DOG_API_URL: "REPLACE_WITH_BASE64_ENCODED_URL"
  # Gateway API key — protects all webhook/query endpoints.
  # Generate one: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
  # WGW_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  # Optional — set when using a non-Gemini LLM provider:
  # LLM_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  # OPENAI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  # ANTHROPIC_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  # OPENROUTER_API_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
  # Direct Supabase read access (optional, OC-Read pattern).
  # When set, identity lookups, memory checks, and channel reads go directly
  # to Supabase.  Writes still go through the mem-dog API.
  # Created automatically by: deploy-supabase-gke (as ocg-supabase-secrets)
  # SUPABASE_URL: "REPLACE_WITH_BASE64_ENCODED_URL"
  # SUPABASE_KEY: "REPLACE_WITH_BASE64_ENCODED_KEY"
