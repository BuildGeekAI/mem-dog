apiVersion: apps/v1
kind: Deployment
metadata:
  name: nango-server
  namespace: nango
  labels:
    app: nango-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nango-server
  template:
    metadata:
      labels:
        app: nango-server
    spec:
      containers:
        - name: nango-server
          image: nangohq/nango-server:latest
          ports:
            - containerPort: 3003
              name: api
            - containerPort: 3009
              name: connect-ui
          envFrom:
            - secretRef:
                name: nango-secrets
            - configMapRef:
                name: nango-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nango-server
  namespace: nango
spec:
  selector:
    app: nango-server
  ports:
    - name: api
      port: 3003
      targetPort: 3003
    - name: connect-ui
      port: 3009
      targetPort: 3009
