# HTTPRoute attaches to the "open-jaws" GKE Gateway and routes /oc/*
# traffic to the openclaw-node service, stripping the /oc prefix.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-node-routes
  namespace: webhook-gateway
  labels:
    app.kubernetes.io/part-of: memdog
    app.kubernetes.io/component: openclaw-node
spec:
  parentRefs:
    - name: open-jaws
      namespace: webhook-gateway
      sectionName: http
    - name: open-jaws
      namespace: webhook-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oc
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: openclaw-node
          port: 18789
