# Optional: Ingress for host-based routing with minikube ingress addon.
# Enable with: minikube addons enable ingress
# Add to /etc/hosts: 127.0.0.1 memdog.local api.memdog.local docs.memdog.local
# Then run: minikube tunnel
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memdog
  namespace: memdog
  labels:
    app.kubernetes.io/part-of: memdog
spec:
  ingressClassName: nginx
  rules:
    - host: memdog.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 3000
    - host: api.memdog.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
    - host: docs.memdog.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 8000
