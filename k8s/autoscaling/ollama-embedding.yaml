apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ollama-scaler
  namespace: webhook-pipeline
  labels:
    app.kubernetes.io/part-of: memdog
spec:
  scaleTargetRef:
    name: ollama
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 600        # 10 min idle before scale to 0
  pollingInterval: 30
  triggers:
    - type: kubernetes-workload
      metadata:
        podSelector: "app=webhook-agent"
        value: "1"           # Scale up when webhook-agent pods exist
