# Install KEDA on the cluster:
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm repo update
#   helm install keda kedacore/keda --namespace keda --create-namespace
#
# Or apply this manifest for a quick install:
#   kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.16.1/keda-2.16.1.yaml
#
# Then install the KEDA HTTP Add-on for HTTP-based scale-to-zero:
#   helm install keda-http-addon kedacore/keda-add-ons-http --namespace keda
