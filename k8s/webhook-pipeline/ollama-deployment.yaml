apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: webhook-pipeline
  labels:
    app: ollama
    app.kubernetes.io/part-of: memdog-webhook-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        workload: ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
          ports:
            - containerPort: 11434
              name: http
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - >-
                    ollama pull embeddinggemma &&
                    echo "warmup" | ollama run embeddinggemma --nowordwrap 2>/dev/null;
                    true
          resources:
            requests:
              cpu: 50m
              memory: 768Mi
            limits:
              cpu: 500m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ollama ps | grep -q embeddinggemma
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
