apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: webhook-pipeline
  labels:
    app: webhook-receiver
    app.kubernetes.io/part-of: memdog-webhook-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      serviceAccountName: webhook-pipeline-sa
      containers:
        - name: receiver
          image: webhook-receiver
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: webhook-pipeline-config
            - secretRef:
                name: webhook-pipeline-secrets
                optional: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
