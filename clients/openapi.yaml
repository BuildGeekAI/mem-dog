openapi: 3.1.0
info:
  title: mem-dog API
  version: 4.0.0
  description: >
    Private AI system for multi-channel data ingestion, AI enrichment,
    temporal knowledge graph, and multi-signal semantic search.
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Health
  - name: Data
  - name: Versions
  - name: List
  - name: Tags
  - name: Access
  - name: Bulk
  - name: Memories
  - name: Users
  - name: Organizations
  - name: Projects
  - name: AI
  - name: Search
  - name: Embeddings
  - name: Viewpoints
  - name: Skills
  - name: AgentConfigs
  - name: AnalysisTemplates
  - name: Prompts
  - name: Graph
  - name: Webhooks
  - name: Integrations
  - name: Stats
  - name: Store
  - name: Ingest
  - name: Auth
  - name: Channels

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key (md_*), JWT, or global API key

  schemas:
    MemoryType:
      type: string
      enum: [timeline, session, conversation, user, organizational, factual, episodic, semantic, custom, tracing]

    MemoryCategory:
      type: string
      enum: [conversation, session, user, organizational]

    AccessLevel:
      type: string
      enum: [private, shared, public, restricted]

    SearchMode:
      type: string
      enum: [vector, fts, hybrid, graph, full]

    Reranker:
      type: string
      enum: [none, rrf, mmr, cross_encoder]

    EntityType:
      type: string
      enum: [person, organization, product, location, date, url, concept, event]

    OrgRole:
      type: string
      enum: [owner, admin, member, viewer]

    Error:
      type: object
      properties:
        detail:
          type: string

    DataItem:
      type: object
      properties:
        data_id:
          type: string
          example: data_01HXYZ
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer

    Memory:
      type: object
      properties:
        memory_id:
          type: string
          example: mem_conv_01HXYZ
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        name:
          type: string
        user_id:
          type: string
        access_level:
          $ref: '#/components/schemas/AccessLevel'
        ttl_hours:
          type: number
          nullable: true
        no_expiry:
          type: boolean
        created_at:
          type: string
          format: date-time

    Entity:
      type: object
      properties:
        entity_id:
          type: string
        name:
          type: string
        entity_type:
          $ref: '#/components/schemas/EntityType'
        canonical_name:
          type: string
        user_id:
          type: string

    Webhook:
      type: object
      properties:
        webhook_id:
          type: string
          example: whk_01HXYZ
        name:
          type: string
        channel_type:
          type: string
        status:
          type: string
          enum: [active, paused, deleted]
        hmac_secret:
          type: string
        created_at:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        org_id:
          type: string
          example: org_01HXYZ
        name:
          type: string
        description:
          type: string

    Project:
      type: object
      properties:
        project_id:
          type: string
          example: proj_01HXYZ
        org_id:
          type: string
        name:
          type: string

    User:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

paths:
  /:
    get:
      tags: [Health]
      summary: API root
      operationId: root
      security: []
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  version:
                    type: string

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: health
      security: []
      responses:
        '200':
          description: Healthy

  # ---------- Auth ----------
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ---------- Data ----------
  /api/v1/data:
    post:
      tags: [Data]
      summary: Create data item
      operationId: createData
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                content:
                  type: string
                name:
                  type: string
                description:
                  type: string
                tags:
                  type: string
                  description: Comma-separated tags
                memory_ids:
                  type: string
                  description: Comma-separated memory IDs
                forward_to_webhook:
                  type: boolean
                url:
                  type: string
                mime_type:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_id:
                    type: string
    get:
      tags: [Data]
      summary: List data items
      operationId: listData
      parameters:
        - name: user
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: tags
          in: query
          schema:
            type: string
        - name: match_all
          in: query
          schema:
            type: boolean
        - name: project_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Data items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataItem'

  /api/v1/data/{data_id}:
    get:
      tags: [Data]
      summary: Get data content
      operationId: getData
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: integer
        - name: user_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Data content
    put:
      tags: [Data]
      summary: Update data (creates new version)
      operationId: updateData
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                content:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      tags: [Data]
      summary: Delete data item
      operationId: deleteData
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /api/v1/data/{data_id}/metadata:
    get:
      tags: [Data]
      summary: Get data metadata
      operationId: getMetadata
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataItem'

  /api/v1/data/{data_id}/info:
    get:
      tags: [Data]
      summary: Get name and description
      operationId: getInfo
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Info
    put:
      tags: [Data]
      summary: Update name and description
      operationId: updateInfo
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Updated

  # ---------- Versions ----------
  /api/v1/versions/{data_id}:
    get:
      tags: [Versions]
      summary: List versions for data item
      operationId: listVersions
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version list

  /api/v1/versions/{data_id}/{version}:
    get:
      tags: [Versions]
      summary: Get specific version
      operationId: getVersion
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Version data

  # ---------- List ----------
  /api/v1/list:
    get:
      tags: [List]
      summary: List user data
      operationId: listUserData
      parameters:
        - name: user
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [meta, raw]
            default: meta
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: User data

  /api/v1/list/{data_id}:
    get:
      tags: [List]
      summary: Get single data item
      operationId: listUserDataItem
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
        - name: user
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [meta, raw]
      responses:
        '200':
          description: Data item

  # ---------- Tags ----------
  /api/v1/data/{data_id}/tags:
    get:
      tags: [Tags]
      summary: Get tags for data item
      operationId: getTags
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tags
    put:
      tags: [Tags]
      summary: Replace all tags
      operationId: updateTags
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
              required: [tags]
      responses:
        '200':
          description: Updated

  /api/v1/data/{data_id}/tags/add:
    post:
      tags: [Tags]
      summary: Add tags (merge)
      operationId: addTags
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
              required: [tags]
      responses:
        '200':
          description: Tags added

  /api/v1/data/{data_id}/tags/remove:
    post:
      tags: [Tags]
      summary: Remove tags
      operationId: removeTags
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
              required: [tags]
      responses:
        '200':
          description: Tags removed

  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List all unique tags
      operationId: listAllTags
      responses:
        '200':
          description: All tags

  /api/v1/tags/search:
    get:
      tags: [Tags]
      summary: Search by tags
      operationId: searchByTags
      parameters:
        - name: tags
          in: query
          required: true
          schema:
            type: string
        - name: match_all
          in: query
          schema:
            type: boolean
        - name: user_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Matching items

  # ---------- Access Control ----------
  /api/v1/data/{data_id}/access:
    get:
      tags: [Access]
      summary: Get access settings
      operationId: getAccess
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access settings
    put:
      tags: [Access]
      summary: Update access control
      operationId: updateAccess
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                access_level:
                  $ref: '#/components/schemas/AccessLevel'
                shared_with:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated

  /api/v1/data/{data_id}/access/check:
    get:
      tags: [Access]
      summary: Check user access
      operationId: checkAccess
      parameters:
        - name: data_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Access check result

  # ---------- Bulk ----------
  /api/v1/bulk/data/delete:
    post:
      tags: [Bulk]
      summary: Delete multiple data items
      operationId: bulkDeleteData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data_ids:
                  type: array
                  items:
                    type: string
                user_id:
                  type: string
              required: [data_ids]
      responses:
        '200':
          description: Deleted

  /api/v1/bulk/data/user/{user}:
    delete:
      tags: [Bulk]
      summary: Delete all user data
      operationId: bulkDeleteUserData
      parameters:
        - name: user
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /api/v1/bulk/data/memory/{memory_id}:
    delete:
      tags: [Bulk]
      summary: Delete memory's data
      operationId: bulkDeleteMemoryData
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /api/v1/bulk/memories/delete:
    post:
      tags: [Bulk]
      summary: Delete multiple memories
      operationId: bulkDeleteMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_ids:
                  type: array
                  items:
                    type: string
                delete_data:
                  type: boolean
                  default: false
                memory_type:
                  $ref: '#/components/schemas/MemoryType'
              required: [memory_ids]
      responses:
        '200':
          description: Deleted

  # ---------- Memories ----------
  /api/v1/memories:
    post:
      tags: [Memories]
      summary: Create memory
      operationId: createMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_type:
                  $ref: '#/components/schemas/MemoryType'
                name:
                  type: string
                user_id:
                  type: string
                ttl_hours:
                  type: number
                no_expiry:
                  type: boolean
                access_level:
                  $ref: '#/components/schemas/AccessLevel'
              required: [memory_type, name]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
    get:
      tags: [Memories]
      summary: List memories
      operationId: listMemories
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: memory_type
          in: query
          schema:
            $ref: '#/components/schemas/MemoryType'
        - name: duration
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - name: access_level
          in: query
          schema:
            $ref: '#/components/schemas/AccessLevel'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/MemoryCategory'
        - name: include_expired
          in: query
          schema:
            type: boolean
        - name: project_id
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Memory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'

  /api/v1/memories/{memory_id}:
    get:
      tags: [Memories]
      summary: Get memory
      operationId: getMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
    put:
      tags: [Memories]
      summary: Update memory
      operationId: updateMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [Memories]
      summary: Delete memory
      operationId: deleteMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
        - name: delete_data
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Deleted

  /api/v1/memories/{memory_id}/data:
    post:
      tags: [Memories]
      summary: Add data to memory
      operationId: addDataToMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data_ids:
                  type: array
                  items:
                    type: string
              required: [data_ids]
      responses:
        '200':
          description: Data added
    get:
      tags: [Memories]
      summary: Get memory's data items
      operationId: getMemoryData
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Data items

  /api/v1/memories/{memory_id}/entries:
    get:
      tags: [Memories]
      summary: Get memory data entries
      operationId: getMemoryEntries
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entries

  /api/v1/memories/{memory_id}/data/{data_id}:
    delete:
      tags: [Memories]
      summary: Remove data from memory
      operationId: removeDataFromMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
        - name: data_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Removed

  /api/v1/memories/{memory_id}/compress:
    post:
      tags: [Memories]
      summary: Compress memory into summary
      operationId: compressMemory
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                archive_originals:
                  type: boolean
                  default: false
                max_summary_length:
                  type: integer
                  default: 2000
      responses:
        '200':
          description: Compression result

  # ---------- Users ----------
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: User list
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Created

  /api/v1/users/dump:
    get:
      tags: [Users]
      summary: Dump all user-owned data
      operationId: dumpUserData
      responses:
        '200':
          description: All user data

  /api/v1/users/{user_id}:
    get:
      tags: [Users]
      summary: Get user
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /api/v1/users/{user_id}/data:
    get:
      tags: [Users]
      summary: Get user's data
      operationId: getUserData
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Data items
    post:
      tags: [Users]
      summary: Create data for user
      operationId: createUserData
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                content:
                  type: string
      responses:
        '201':
          description: Created

  /api/v1/users/username/{username}:
    get:
      tags: [Users]
      summary: Get user by username
      operationId: getUserByUsername
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User

  /api/v1/users/{user_id}/api-keys:
    get:
      tags: [Users]
      summary: List API keys
      operationId: listApiKeys
      parameters:
        - name: user_id
          in: path
          required: true
