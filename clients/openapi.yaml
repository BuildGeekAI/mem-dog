        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                search_mode:
                  $ref: '#/components/schemas/SearchMode'
                reranker:
                  $ref: '#/components/schemas/Reranker'
                limit:
                  type: integer
                  default: 10
                user_id:
                  type: string
                memory_type:
                  $ref: '#/components/schemas/MemoryType'
                temporal_filter:
                  type: string
                  description: ISO date for point-in-time graph queries
              required: [query]
      responses:
        '200':
          description: Search results

