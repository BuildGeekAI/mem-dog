                search_mode:
                  $ref: '#/components/schemas/SearchMode'
                reranker:
                  $ref: '#/components/schemas/Reranker'
                conversation_history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                memory_type:
                  $ref: '#/components/schemas/MemoryType'
              required: [query]
      responses:
        '200':
          description: Chat response with [1][2] citations

